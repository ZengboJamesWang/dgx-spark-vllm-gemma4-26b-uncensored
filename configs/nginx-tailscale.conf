# vLLM API - HTTPS via Tailscale only
# Replace YOUR_TAILSCALE_IP with your actual Tailscale IP (get it with: tailscale ip -4)

server {
    listen YOUR_TAILSCALE_IP:8443 ssl;
    server_name _;

    # Generate a self-signed cert or use Tailscale's built-in cert:
    #   sudo tailscale cert your-machine.YOUR_TAILNET.ts.net
    # Then update the paths below.
    ssl_certificate /etc/ssl/certs/vllm-tailscale.crt;
    ssl_certificate_key /etc/ssl/private/vllm-tailscale.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed by your client)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }
}

# Optional: redirect HTTP to HTTPS on Tailscale only
server {
    listen YOUR_TAILSCALE_IP:8081;
    server_name _;
    return 301 https://$host:8443$request_uri;
}
